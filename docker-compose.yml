services:
  postgres:
    image: postgres:16-alpine
    container_name: sa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sa_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sa_password_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-smart_attendance}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-sa_user} -d ${POSTGRES_DB:-smart_attendance}']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sa-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: sa-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-sa_user}:${POSTGRES_PASSWORD:-sa_password_change_me}@postgres:5432/${POSTGRES_DB:-smart_attendance}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-in-prod}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-prod}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      RATE_LIMIT_LOGIN_PER_MINUTE: ${RATE_LIMIT_LOGIN_PER_MINUTE:-5}
    ports:
      - '${API_PORT:-3000}:3000'
    # Prisma migrate deploy + seed chạy trong entrypoint.sh

  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
      args:
        # Build-time baking: browser code phải biết URL public của api khi
        # container chạy. Default: port-mapped localhost:3000.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000/api/v1}
    container_name: sa-portal
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3100
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000/api/v1}
    ports:
      - '${PORTAL_PORT:-3100}:3100'

volumes:
  postgres-data:
  redis-data:
